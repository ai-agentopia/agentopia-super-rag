name: Build Image

# IMAGE PUSH IS GATED — agentopia-super-rag#24 (atomic cutover)
#
# This workflow MUST remain workflow_dispatch only until Phase 3 cutover
# sequence is explicitly initiated. Enabling push trigger before cutover
# creates two publishers for ghcr.io/ai-agentopia/knowledge-api, which
# violates the single-publisher rule (docs/migration.md).
#
# Phase 3 cutover sequence (agentopia-super-rag#24):
#   Step 1: Switch this workflow to push trigger on dev branch
#   Step 2: Verify first successful dev-{sha} push
#   Step 3: Switch ArgoCD Image Updater (agentopia-infra#113)
#   Step 4: Disable monorepo image push (agentopia-protocol#389)

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push to GHCR (ONLY use after Phase 3 cutover — agentopia-super-rag#24)"
        required: false
        default: "false"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cutover gate check
        run: |
          if [ "${{ inputs.push_image }}" = "true" ]; then
            echo "ERROR: Image push is gated by atomic cutover (agentopia-super-rag#24)."
            echo "Do not push until Phase 3 cutover sequence is explicitly initiated."
            exit 1
          fi
          echo "Build-only mode: image will be built but not pushed to GHCR."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ghcr.io/ai-agentopia/knowledge-api:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
